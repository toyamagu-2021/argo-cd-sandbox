apiVersion: batch/v1
kind: Job
metadata:
  name: pre-sync
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
      - name: job
        image: alpine:latest
        command: ["sh -c"]
        args: ['"sleep 10; echo "this is a test"']
      restartPolicy: Never
